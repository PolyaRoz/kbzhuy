services:
  api:
    build:
      context: ../backend
    environment:
      KBZHUY_DATABASE_URL: postgresql+asyncpg://kbzhuy:kbzhuy@db:5432/kbzhuy
      KBZHUY_REDIS_URL: redis://redis:6379/0
      KBZHUY_DEBUG: "true"
      KBZHUY_ANTHROPIC_API_KEY: ${KBZHUY_ANTHROPIC_API_KEY:-}
      KBZHUY_AI_MODEL: ${KBZHUY_AI_MODEL:-claude-sonnet-4-6}
      KBZHUY_USE_LOCAL_LLM: ${KBZHUY_USE_LOCAL_LLM:-false}
      KBZHUY_LOCAL_LLM_URL: ${KBZHUY_LOCAL_LLM_URL:-http://host.docker.internal:11434/v1}
      KBZHUY_LOCAL_LLM_MODEL: ${KBZHUY_LOCAL_LLM_MODEL:-qwen2.5:14b}
      KBZHUY_USE_GIGACHAT: ${KBZHUY_USE_GIGACHAT:-false}
      KBZHUY_GIGACHAT_CREDENTIALS: ${KBZHUY_GIGACHAT_CREDENTIALS:-}
      KBZHUY_GIGACHAT_MODEL: ${KBZHUY_GIGACHAT_MODEL:-GigaChat}
      PYTHONPATH: /app
    volumes:
      - ../data:/app/data:ro
      - ../data/culinary:/app/culinary:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    ports:
      - "8081:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kbzhuy
      POSTGRES_PASSWORD: kbzhuy
      POSTGRES_DB: kbzhuy
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbzhuy"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data_dev:
